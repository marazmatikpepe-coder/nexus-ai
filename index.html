<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Самообучающаяся нейросеть</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Фон нейросети -->
    <div class="neural-bg" id="neuralBg"></div>

    <!-- Главный контейнер -->
    <div class="nexus-container">
        <!-- Шапка Nexus -->
        <header class="nexus-header">
            <div class="nexus-avatar">
                <div class="avatar-core"></div>
                <div class="avatar-ring"></div>
            </div>
            <div class="nexus-info">
                <h1 class="nexus-title">Nexus AI</h1>
                <div class="nexus-status" id="nexusStatus">Нейросеть активна</div>
            </div>
            <div class="nexus-stats">
                <span class="stat-item" id="knowledgeCount">📚 0 тем</span>
                <span class="stat-item" id="messageCount">💬 0 ответов</span>
            </div>
            <div class="learning-indicator" id="learningIndicator">
                <div class="learning-pulse"></div>
                <span>Обучение...</span>
            </div>
        </header>

        <!-- Область сообщений -->
        <main class="nexus-messages" id="messagesContainer">
            <div class="welcome-message">
                <div class="nexus-message">
                    <div class="message-avatar">🧠</div>
                    <div class="message-content">
                        <p>👋 Привет! Я <strong>Nexus</strong> — самообучающаяся нейросеть.</p>
                        <p>Я понимаю контекст, учусь каждый день и могу ответить на тысячи вопросов. Спроси меня о чем угодно!</p>
                        <span class="message-time">Только что</span>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <button onclick="askQuickQuestion('Что такое искусственный интеллект?')" class="quick-btn">🤖 Что такое ИИ?</button>
                    <button onclick="askQuickQuestion('Расскажи о квантовых компьютерах')" class="quick-btn">⚛️ Квантовые компьютеры</button>
                    <button onclick="askQuickQuestion('Как работает нейросеть?')" class="quick-btn">🧬 Как работает нейросеть?</button>
                    <button onclick="askQuickQuestion('Что такое машинное обучение?')" class="quick-btn">📊 Машинное обучение</button>
                </div>
            </div>
        </main>

        <!-- Панель инструментов -->
        <div class="nexus-toolbar">
            <button class="toolbar-btn" onclick="addKnowledge()" title="Добавить знания">
                <span>📚</span> Обучить
            </button>
            <button class="toolbar-btn" id="voiceBtn" onclick="toggleVoice()" title="Голосовой ввод">
                <span>🎤</span> Голос
            </button>
            <button class="toolbar-btn" onclick="exportChat()" title="Экспорт диалога">
                <span>💾</span> Экспорт
            </button>
            <button class="toolbar-btn" onclick="clearChat()" title="Очистить чат">
                <span>🗑️</span> Очистить
            </button>
        </div>

        <!-- Поле ввода -->
        <footer class="nexus-input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="nexus-input" 
                    id="userInput" 
                    placeholder="Спроси Nexus о чем угодно..."
                    autocomplete="off"
                >
                <div class="input-suggestions" id="suggestions"></div>
            </div>
            <button class="nexus-send-btn" id="sendBtn" onclick="sendMessage()">
                <span class="send-icon">➤</span>
                <span class="send-text">Отправить</span>
            </button>
        </footer>
    </div>

    <!-- Модальное окно обучения -->
    <div class="modal" id="trainingModal">
        <div class="modal-content">
            <h2>📚 Обучение Nexus</h2>
            <p>Добавь новые знания в нейросеть</p>
            <textarea id="trainingInput" placeholder="Введи информацию для обучения..."></textarea>
            <div class="modal-actions">
                <button onclick="submitTraining()" class="btn-primary">Обучить</button>
                <button onclick="closeModal()" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Скрипты Nexus -->
    <script src="js/config.js"></script>
    <script src="js/nexus-memory.js"></script>
    <script src="js/nexus-core.js"></script>
    <script src="js/nexus-learning.js"></script>
    <script src="js/nexus-voice.js"></script>
    <script src="js/nexus-ui.js"></script>
</body>
</html>
